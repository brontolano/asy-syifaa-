name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload deploy script
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          source: "deploy/hostinger-deploy.sh"
          target: "~/"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            chmod +x ~/deploy/hostinger-deploy.sh
            APP_NAME=asy-syifaa \
            BRANCH=main \
            REPO_URL='https://github.com/brontolano/asy-syifaa-.git' \
            DEPLOY_ROOT='/home/${{ secrets.HOSTINGER_USER }}/deploy/asy-syifaa-github' \
            WEB_ROOT='/home/${{ secrets.HOSTINGER_USER }}/domains/asy-syifaa.com/public_html' \
            ~/deploy/hostinger-deploy.sh
