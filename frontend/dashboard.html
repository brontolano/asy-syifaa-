<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asy-Syifaa ERP - Dashboard</title>
  <link rel="icon" type="image/x-icon" href="/AsySyifaa.ico" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="dashboard">
    <header class="topbar">
      <div class="topbar-title">
        <img src="/assets/img/logo.png" alt="Logo Asy-Syifaa" class="brand-logo small" />
        <h1>Dashboard</h1>
      </div>
      <div class="actions">
        <div>
          <label for="role">Role:</label>
          <select id="role">
            <option value="ustadz">Ustadz</option>
            <option value="mudiraam">Mudir'aam</option>
            <option value="abuya">Abuya</option>
          </select>
        </div>
        <button class="btn ghost" type="button" data-theme-toggle>Mode Gelap</button>
      </div>
    </header>

    <section class="kpi-grid" id="kpiGrid"></section>

    <section class="widget-box">
      <h2>Widget Prioritas</h2>
      <ul id="widgetList"></ul>
    </section>

    <a class="back-link" href="/">← Kembali ke Landing</a>
  </main>

  <script src="/theme.js"></script>
  <script src="/dashboard.js"></script>
</body>
</html>
