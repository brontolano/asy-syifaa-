<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asy-Syifaa ERP - Perpustakaan Digital</title>
  <link rel="icon" type="image/x-icon" href="/AsySyifaa.ico" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="dashboard">
    <header class="topbar">
      <div class="topbar-title">
        <img src="/assets/img/logo.png" alt="Logo Asy-Syifaa" class="brand-logo small" />
        <h1>Perpustakaan Digital</h1>
      </div>
      <button class="btn ghost" type="button" data-theme-toggle>Mode Gelap</button>
    </header>

    <section class="widget-box">
      <h2>Upload PDF</h2>
      <form id="uploadForm" class="library-form">
        <label>Judul Dokumen</label>
        <input id="title" type="text" placeholder="Contoh: Kitab Fiqih Kelas 1" />
        <label>File PDF</label>
        <input id="pdf" type="file" accept="application/pdf" required />
        <button class="btn primary" type="submit">Upload PDF</button>
      </form>
      <p class="note">File tersimpan di server: <code>backend/storage/library-pdfs</code></p>
      <p class="note">Metadata tersimpan di: <code>backend/data/library.json</code></p>
      <p id="uploadMsg" class="note"></p>
    </section>

    <section class="widget-box">
      <h2>Koleksi PDF</h2>
      <div id="libraryList" class="library-list"></div>
    </section>

    <a class="back-link" href="/">← Kembali ke Landing</a>
  </main>

  <script src="/theme.js"></script>
  <script src="/library.js"></script>
</body>
</html>
