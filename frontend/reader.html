<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reader PDF - Asy-Syifaa ERP</title>
  <link rel="icon" type="image/x-icon" href="/AsySyifaa.ico" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="reader-only-body">
  <main class="reader-only-main">
    <section class="pdf-toolbar" aria-label="Kontrol PDF">
      <button id="prevPageBtn" class="btn ghost" type="button" title="Halaman sebelumnya">◀</button>
      <label for="pageInput" class="sr-only">Halaman</label>
      <input id="pageInput" class="pdf-page-input" type="number" min="1" value="1" />
      <span id="pageTotal" class="note">/ 1</span>
      <button id="nextPageBtn" class="btn ghost" type="button" title="Halaman berikutnya">▶</button>
      <button id="zoomOutBtn" class="btn ghost" type="button" title="Perkecil">－</button>
      <button id="zoomInBtn" class="btn ghost" type="button" title="Perbesar">＋</button>
      <button id="fitToggleBtn" class="btn ghost" type="button" title="Mode tampilan">Fit Width</button>
    </section>
    <div class="reader-only-shell" id="readerShell">
      <canvas id="readerCanvas" class="reader-canvas" aria-label="Halaman PDF"></canvas>
    </div>
    <p id="readerState" class="note"></p>
  </main>

  <script type="module" src="/reader.js"></script>
</body>
</html>
